---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  product_name: chef
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec

x-run_lists:
  default: &default_run_list
    - recipe[test::default]

x-attributes:
  default: &default_attributes
    dnsmasq_test:
      enabled: true

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

platforms:
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-11
  - name: debian-12
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-9
  - name: ubuntu-2204
  - name: ubuntu-2404

suites:
  - name: default
    run_list: *default_run_list
    attributes: *default_attributes
    verifier: *default_verifier
